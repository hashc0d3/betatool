# Развёртывание: docker compose up -d --build
# HTTPS: после первого запуска на сервере — ./scripts/init-letsencrypt.sh (нужен CERTBOT_EMAIL)
# Данные: ./data и ./uploads не удаляются при пересборке. Папка ./certbot — сертификаты (в .gitignore).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4001"
      NODE_ENV: production
      FRONTEND_ORIGIN: "https://playbetatool.ru,http://playbetatool.ru,http://www.playbetatool.ru,https://www.playbetatool.ru,http://155.117.46.144,http://localhost:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
