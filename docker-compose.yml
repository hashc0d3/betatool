# Развёртывание: скопируйте проект на сервер, затем: docker compose up -d --build
# Сайт: http://playbetatool.ru (порт 80).
# Данные SQLite и загрузки лежат в папках ./data и ./uploads рядом с compose — они НЕ удаляются
# при пересборке образов. Не используйте `docker compose down -v` без нужды (ключ -v удаляет тома).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4001"
      NODE_ENV: production
      # Несколько origin через запятую (сайт, IP, локальная отладка)
      FRONTEND_ORIGIN: "https://playbetatool.ru,http://playbetatool.ru,http://www.playbetatool.ru,https://www.playbetatool.ru,http://155.117.46.144,http://localhost:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
