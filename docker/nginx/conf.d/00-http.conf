upstream next_app {
    server frontend:3000;
}

upstream nest_api {
    server backend:4001;
}

# Этап 1 (до сертификата): HTTP + ACME. После выпуска сертификата выполните: ./scripts/enable-https.sh
server {
    listen 80;
    listen [::]:80;
    server_name playbetatool.ru www.playbetatool.ru 155.117.46.144;

    client_max_body_size 25m;

    # ^~ — чтобы этот префикс не уступал другим location и не уходил в proxy на Next (иначе LE получает 404).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /api/ {
        proxy_pass http://nest_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://nest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://next_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
