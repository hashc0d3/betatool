# Этап 1 (до сертификата): HTTP + ACME. После выпуска сертификата выполните: ./scripts/enable-https.sh
#
# resolver + proxy_pass через переменные: иначе nginx резолвит frontend/backend при старте и падает,
# если контейнеры ещё не подняты («host not found in upstream»).

server {
    listen 80;
    listen [::]:80;
    server_name playbetatool.ru www.playbetatool.ru 155.117.46.144;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 25m;

    # ^~ — чтобы этот префикс не уступал другим location и не уходил в proxy на Next (иначе LE получает 404).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location /api/ {
        set $api_upstream backend:4001;
        proxy_pass http://$api_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $api_upstream backend:4001;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
