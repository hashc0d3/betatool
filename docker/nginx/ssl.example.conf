# Пример HTTPS после выпуска сертификата (Certbot):
# 1) На сервере: certbot certonly --webroot -w /var/www/certbot -d playbetatool.ru -d www.playbetatool.ru
# 2) Смонтируйте /etc/letsencrypt в контейнер nginx и добавьте второй server { listen 443 ssl; ... }
#
# server {
#     listen 443 ssl http2;
#     server_name playbetatool.ru www.playbetatool.ru;
#     ssl_certificate     /etc/letsencrypt/live/playbetatool.ru/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/playbetatool.ru/privkey.pem;
#     # те же location /api/ /uploads/ / что в default.conf
# }
